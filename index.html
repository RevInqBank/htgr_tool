<title>HTGR 본선 — 최적설계 인터랙티브 툴</title>
<style>
:root{color-scheme:light;
 --page:#f4f5f3;--surface:#fcfcfb;--ink:#0b0b0b;--ink2:#52514e;--muted:#898781;
 --grid:#e6e6df;--axis:#c3c2b7;--ring:rgba(11,11,11,.09);--hover:rgba(11,11,11,.04);
 --g-NST:#86b6ef;--g-NSRST:#3987e5;--g-SR:#184f95;
 --pass:#0ca30c;--fail:#d03b3b;--c-con:#4a3aa7;--c-om:#1baf7a;--c-fp:#eb6834;
 --opt:#5b5f66;--cf-pos:#2a78d6;--cf-neg:#e34948;--accent:#184f95;}
@media (prefers-color-scheme:dark){:root:where(:not([data-theme="light"])){
 --page:#0d0d0d;--surface:#191919;--ink:#f4f4f0;--ink2:#c3c2b7;--muted:#8f8d86;
 --grid:#2a2a28;--axis:#3a3a37;--ring:rgba(255,255,255,.11);--hover:rgba(255,255,255,.05);
 --g-NST:#5598e7;--g-NSRST:#3987e5;--g-SR:#5a8fd6;
 --c-con:#6a5ac7;--c-om:#22c98d;--c-fp:#d95926;--opt:#b0b0a8;--cf-pos:#3987e5;--cf-neg:#e66767;--accent:#5a8fd6;}}
:root[data-theme="dark"]{
 --page:#0d0d0d;--surface:#191919;--ink:#f4f4f0;--ink2:#c3c2b7;--muted:#8f8d86;
 --grid:#2a2a28;--axis:#3a3a37;--ring:rgba(255,255,255,.11);--hover:rgba(255,255,255,.05);
 --g-NST:#5598e7;--g-NSRST:#3987e5;--g-SR:#5a8fd6;
 --c-con:#6a5ac7;--c-om:#22c98d;--c-fp:#d95926;--opt:#b0b0a8;--cf-pos:#3987e5;--cf-neg:#e66767;--accent:#5a8fd6;}
*{box-sizing:border-box}
body{margin:0;background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
.top{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--ring);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}

h4{font-size:13px}

.subnav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}

.tip{position:fixed;display:none;z-index:100;max-width:250px;background:var(--surface);color:var(--ink);border:1px solid var(--ring);border-radius:9px;padding:9px 12px;font-size:12px;line-height:1.5;box-shadow:0 6px 20px rgba(0,0,0,.18);pointer-events:none}
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:16px}
.modalcard{background:var(--surface);border:1px solid var(--ring);border-radius:14px;padding:18px;max-width:640px;width:100%;max-height:86vh;display:flex;flex-direction:column}
.csvta{width:100%;flex:1;min-height:280px;margin:10px 0;font-family:ui-monospace,Menlo,monospace;font-size:11px;border:1px solid var(--ring);border-radius:8px;padding:10px;background:var(--page);color:var(--ink);white-space:pre;resize:vertical}
.modalcard.sm{max-width:400px}
.pinp{width:100%;padding:9px 11px;margin:10px 0;border:1px solid var(--ring);border-radius:8px;background:var(--page);color:var(--ink);font-family:inherit;font-size:14px}
.chcap{font-size:12.5px;color:var(--ink2);margin:14px 0 6px;line-height:1.55}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:300;background:var(--accent);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);transition:opacity .35s}
</style>
<div class="top"><h1>🔥 HTGR 최적설계 툴</h1><div id="nav"></div>
<span id="pstate" class="pchip"></span>
<button class="themebtn" onclick="var r=document.documentElement;r.dataset.theme=(r.dataset.theme==='dark'?'light':'dark');if(window.render)render();">◐ 테마</button></div>
<div id="panel"></div>
<script>
// HTGR 본선 계산 엔진 — 순수함수, node/브라우저 공용. 데이터는 ../data/*.yaml 값 내장.
// (function(global){ ... })() 로 감싸 브라우저 window.ENGINE / node module.exports 양쪽 노출.
(function(root){
"use strict";

// ---- 데이터 (data/*.yaml 정본) ----
const C = [ // [name, base_price(백만원), recovery_days, system]
 ["원자로압력용기",19000,180,"핵열공급계통"],
 ["제어봉집합체",15200,60,"핵열공급계통"],
 ["중간열교환기",11400,90,"핵열공급계통"],
 ["헬륨순환기",11400,30,"핵열공급계통"],
 ["교차용기",11400,180,"핵열공급계통"],
 ["헬륨서비스계통",7600,10,"핵열공급계통"],
 ["원자로공동냉각계통",16200,60,"잔열제거계통"],
 ["정지냉각계통",10800,30,"잔열제거계통"],
 ["급수펌프",4100,7,"보조계통"],
 ["증기발생기",4100,45,"보조계통"],
 ["계측제어전기계통",4100,14,"보조계통"],
 ["디젤발전기",4100,3,"보조계통"],
 ["비상배터리",2050,1,"보조계통"]];
const CI={}; C.forEach((c,i)=>CI[c[0]]=i);
const SCEN=[ // [id,name,[comps],combine,dose_mSv]
 ["S01","소규모 배관 누설",["헬륨서비스계통"],"single",0.05],
 ["S02","소외 전력 상실",["계측제어전기계통"],"single",0.01],
 ["S03","단일 제어봉 오작동",["제어봉집합체","계측제어전기계통"],"or",0.01],
 ["S04","중규모 배관 손상",["중간열교환기"],"single",5],
 ["S05","가압 강제 냉각 상실",["헬륨순환기","계측제어전기계통"],"or",1],
 ["S06","증기발생기 파손",["증기발생기"],"single",20],
 ["S07","반응도 삽입",["제어봉집합체","계측제어전기계통"],"and",50],
 ["S08","대형 배관 파단",["원자로압력용기","교차용기"],"or",80],
 ["S09","잔열 제거 능력 완전 상실",["원자로공동냉각계통","정지냉각계통"],"and",250],
 ["S10","정지불능 과도상태",["제어봉집합체","계측제어전기계통"],"and",150],
 ["S11","소외전력상실",["디젤발전기","비상배터리"],"and",100]];
SCEN.forEach(s=>s.push(s[2].map(n=>CI[n]))); // s[5]=comp indices

function defaults(){return{
 grades:{SR:{freq:1e-5,ratio:5},NSRST:{freq:1e-3,ratio:2},NST:{freq:1e-1,ratio:1}},
 containBase:22550, remCapex:125700,
 opexCash:24462, deprec:4077, opexTotal:28539,          // 감가상각 분리(이중계산 방지)
 heatPrice:50, annualHeat:788400, lossDay:108, penDay:100,
 constrYears:10, opYears:60, disc:0.045, esc:0.025, doseExp:2, baseCF:1.0 };}

function fcDose(f){ // 목표곡선 허용선량[REM] at 빈도 f
 if(f>0.1)return 0.1/f; if(f>0.01)return 1;
 if(f>1e-4)return 0.04*Math.pow(f,-0.699);
 if(f>=5e-7)return 25*Math.pow(f/1e-4,-0.642); return Infinity; }

// 할인 LCOH의 capex 연환산 계수 = NPV(건설비 스트림)/NPV(에너지 스트림).
// 에너지 할인계수합이 모든 설계 공통이라, 이 계수 하나로 축약됨. 실질할인율 rr=(1+disc)/(1+esc)-1.
function capexFactor(P){
 const rr=(1+P.disc)/(1+P.esc)-1;
 if(Math.abs(rr)<1e-9) return 1/P.opYears;
 let A=0,K=0;
 for(let t=1;t<=P.constrYears;t++)A+=(1/P.constrYears)/Math.pow(1+rr,t);
 for(let t=P.constrYears+1;t<=P.constrYears+P.opYears;t++)K+=1/Math.pow(1+rr,t);
 return A/K;
}
function scenFreq(grades,s,G){
 const idx=s[5];
 if(s[3]==="single")return G[grades[idx[0]]].freq;
 if(s[3]==="or"){let r=1;for(const i of idx)r*=(1-G[grades[i]].freq);return 1-r;}
 let r=1;for(const i of idx)r*=G[grades[i]].freq;return r; }

// grades: array[13] of 'SR'|'NSRST'|'NST'; x: 격납배수; opt:{penalty:bool, params}
function compute(grades,x,opt){
 const P=opt.params, G=P.grades;
 let capex=P.remCapex+P.containBase*x;
 for(let i=0;i<13;i++)capex+=C[i][1]*G[grades[i]].ratio;
 const scen=[]; let npass=0;
 for(const s of SCEN){
   const f=scenFreq(grades,s,G), doseRem=(s[4]/10)/Math.pow(x,P.doseExp), allowed=fcDose(f);
   const pass=doseRem<=allowed*(1+1e-9); if(pass)npass++;
   scen.push({id:s[0],name:s[1],freq:f,dose:doseRem,allowed,pass,margin:allowed/doseRem});
 }
 let downtime=0,outEvents=0; for(let i=0;i<13;i++){downtime+=G[grades[i]].freq*C[i][2];outEvents+=G[grades[i]].freq;}
 const availTrue=(365-downtime)/365, lossTrue=downtime*(P.lossDay+P.penDay);
 const on=!!opt.penalty;
 const bcf=(P.baseCF!=null?P.baseCF:1);           // 기본 이용률(계획정지 등, 고장과 별개)
 const avail=bcf*(on?availTrue:1), loss=on?lossTrue:0, pen=on?downtime*P.penDay:0;
 const supply=P.annualHeat*avail*1000; // kWh/년 (실제 공급 = 계약열량 × 기본이용률 × 고장가동률)
 const cfac=capexFactor(P);                        // 할인 자본비 연환산 계수 (구 1/60 대체)
 const lcohCon=(capex*cfac)*1e6/supply, lcohOm=P.opexCash*1e6/supply, lcohFp=loss*1e6/supply;
 const lcoh=lcohCon+lcohOm+lcohFp;                 // 할인 LCOH = NPV(비용)/NPV(에너지), 판매가 손익분기 단가
 const annualCost=P.opexCash+capex*cfac+loss;      // LCOH 분자(백만원/년, 할인 연환산)
 const rev0=supply*P.heatPrice/1e6; // 백만원/년
 const NY=P.constrYears+P.opYears;
 const cf=yr=>yr<=P.constrYears? -capex/P.constrYears : (rev0-P.opexCash-pen)*Math.pow(1+P.esc,yr-P.constrYears-1);
 const flows=[]; let cum=0,pb=null;
 for(let yr=1;yr<=NY;yr++){const v=cf(yr);cum+=v;flows.push([yr,v,cum]);if(pb===null&&yr>P.constrYears&&cum>=0)pb=yr;}
 const npvAt=r=>{let s=0;for(let yr=1;yr<=NY;yr++)s+=cf(yr)/Math.pow(1+r,yr);return s;};
 const npv=npvAt(P.disc);
 let lo=-0.5,hi=0.6;for(let k=0;k<90;k++){const m=(lo+hi)/2;if(npvAt(m)>0)lo=m;else hi=m;}
 const irr=(lo+hi)/2;
 return {capex,scen,npass,downtime,outEvents,availTrue,lossTrue,avail,loss,pen,lcoh,lcohCon,lcohOm,lcohFp,
         annualCost,flows,npv,irr,payback:pb,rev0,supply};
}

// 격납 최소배수: 고정 등급조합에서 11/11 통과하는 최소 x (없으면 null)
function minContainX(grades,opt){
 const P=opt.params,G=P.grades; let xmin=1; const ex=P.doseExp||2;
 for(const s of SCEN){
   const f=scenFreq(grades,s,G), allowed=fcDose(f), d1=s[4]/10;
   if(d1>allowed){ const need=Math.pow(d1/allowed,1/ex); if(need>xmin)xmin=need; }
 }
 return xmin>10.0000001? null : xmin;
}

// LCOH만 싸게 계산(최적화 내부용, IRR/현금흐름 생략). x_min 동시 산출.
function evalLcohCheap(g,P,G,penalty,cfac){
 let xmin=1; const ex=P.doseExp||2;
 for(const s of SCEN){const f=scenFreq(g,s,G),allowed=fcDose(f),d1=s[4]/10;
   if(d1>allowed){const need=Math.pow(d1/allowed,1/ex);if(need>xmin)xmin=need;}}
 if(xmin>10.0000001)return null;
 let capex=P.remCapex+P.containBase*xmin;
 for(let i=0;i<13;i++)capex+=C[i][1]*G[g[i]].ratio;
 let downtime=0;for(let i=0;i<13;i++)downtime+=G[g[i]].freq*C[i][2];
 const avail=(P.baseCF!=null?P.baseCF:1)*(penalty?(365-downtime)/365:1), loss=penalty?downtime*(P.lossDay+P.penDay):0;
 const supply=P.annualHeat*avail*1000;
 const lcoh=(capex*cfac+P.opexCash+loss)*1e6/supply;
 return {lcoh,x:xmin};
}

// 최적화: locked(index->grade) 고정, 나머지 전수전개. penalty 반영 LCOH 최소.
// 청크 실행(브라우저 rAF) — 각 조합은 LCOH만 계산(빠름). best만 최종 full compute.
function makeOptimizer(locked,opt){
 const P=opt.params,G=P.grades,penalty=!!opt.penalty,cfac=capexFactor(P);
 const free=[]; for(let i=0;i<13;i++) if(!(i in locked)) free.push(i);
 const total=Math.pow(3,free.length);
 const GN=["SR","NSRST","NST"];
 const base=new Array(13); for(let i=0;i<13;i++) base[i]=locked[i]||"NST";
 let i=0,best=null,feasible=0; const conv=[];
 function evalCombo(n){
   const g=base; let t=n;
   for(const fi of free){ g[fi]=GN[t%3]; t=(t/3)|0; }
   const r=evalLcohCheap(g,P,G,penalty,cfac);
   if(r){ feasible++; if(!best||r.lcoh<best.lcoh) best={grades:g.slice(),x:r.x,lcoh:r.lcoh}; }
 }
 return {
   total, free,
   run(chunk,cb){ const stop=Math.min(i+chunk,total);
     for(;i<stop;i++)evalCombo(i);
     conv.push([i,best?best.lcoh:null]);
     const done=i>=total;
     if(done&&best) best.res=compute(best.grades,best.x,opt); // 최종만 full
     if(cb)cb({count:i,total,feasible,best,done,conv});
     return done;
   },
   runAll(){ for(;i<total;i++)evalCombo(i); if(best)best.res=compute(best.grades,best.x,opt);
     return {count:total,total,feasible,best,conv}; },
   state(){return{count:i,total,feasible,best,conv};}
 };
}

const API={C,CI,SCEN,defaults,fcDose,capexFactor,compute,minContainX,makeOptimizer,
 allGrades:g=>Array(13).fill(g)};
if(typeof module!=="undefined"&&module.exports)module.exports=API;
root.ENGINE=API;
})(typeof self!=="undefined"?self:this);

function fcChart(r){
  const W=560,H=380,m={l:52,r:16,t:24,b:48};const s=svg(W,H);
  const x0=m.l,x1=W-m.r,y0=H-m.b,y1=m.t;
  const dD=[1e-3,1e3],dF=[1e-7,1e1];
  const X=v=>logmap(Math.max(dD[0],Math.min(dD[1],v)),dD[0],dD[1],x0,x1);
  const Y=v=>logmap(Math.max(dF[0],Math.min(dF[1],v)),dF[0],dF[1],y0,y1);
  for(let e=-3;e<=3;e++){const gx=X(Math.pow(10,e));els("line",{x1:gx,y1:y1,x2:gx,y2:y0,class:"gl"},s);
    els("text",{x:gx,y:y0+15,"text-anchor":"middle",class:"ax"},s).textContent="1e"+e;}
  for(let e=-7;e<=1;e++){const gy=Y(Math.pow(10,e));els("line",{x1:x0,y1:gy,x2:x1,y2:gy,class:"gl"},s);
    els("text",{x:x0-6,y:gy+3,"text-anchor":"end",class:"ax"},s).textContent="1e"+e;}
  // target curve + region
  let pts=[];for(let lf=1;lf>=-6.3;lf-=0.05){const f=Math.pow(10,lf);let d=E.fcDose(f);if(!isFinite(d)||d>1e3)d=1e3;if(d<1e-3)d=1e-3;pts.push([X(d),Y(f)]);}
  els("polygon",{points:pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")+` ${x0},${y0} ${x0},${y1}`,fill:"var(--pass)","fill-opacity":".07"},s);
  els("path",{d:"M"+pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join("L"),fill:"none",stroke:"var(--muted)","stroke-width":2},s);
  els("text",{x:X(1e3)-4,y:Y(2e-5),"text-anchor":"end",class:"axl",fill:"var(--muted)"},s).textContent="목표곡선";
  r.scen.forEach((p,i)=>{const cx=X(p.dose),cy=Y(p.freq);
    els("circle",{cx,cy,r:6,fill:p.pass?"var(--surface)":"var(--fail)",stroke:p.pass?"var(--pass)":"var(--fail)","stroke-width":2.2},s);
    const comps=E.SCEN[i][2].join(", ");
    const html=`<b>${p.id} · ${p.name}</b><br>연관 기기: ${comps}<br>결합 방식: <b>${E.SCEN[i][3].toUpperCase()}</b><br>사고 빈도: ${p.freq.toExponential(2)} 회/년<br>공공 선량: ${p.dose.toFixed(3)} REM (허용 ${p.allowed.toFixed(3)})<br><b style="color:${p.pass?'var(--pass)':'var(--fail)'}">${p.pass?"✓ 합격":"✗ 불합격"}</b> (여유 ×${p.margin.toFixed(2)})`;
    const hit=els("circle",{cx,cy,r:16,fill:"transparent"},s);hit.style.cursor="pointer";
    hit.addEventListener("mouseenter",e=>showTip(html,e));
    hit.addEventListener("mousemove",e=>showTip(html,e));
    hit.addEventListener("mouseleave",hideTip);
    hit.addEventListener("touchstart",e=>{e.preventDefault();e.stopPropagation();showTip(html,e);},{passive:false});
  });
  els("circle",{cx:x0+12,cy:y1-4,r:5,fill:"var(--surface)",stroke:"var(--pass)","stroke-width":2},s);
  els("text",{x:x0+21,y:y1,class:"ax",fill:"var(--ink2)"},s).textContent="합격";
  els("circle",{cx:x0+62,cy:y1-4,r:5,fill:"var(--fail)"},s);
  els("text",{x:x0+71,y:y1,class:"ax",fill:"var(--ink2)"},s).textContent="불합격";
  els("text",{x:(x0+x1)/2,y:H-6,"text-anchor":"middle",class:"axl"},s).textContent="공공 선량 [REM] (log) →";
  els("text",{x:-((y0+y1)/2),y:13,"text-anchor":"middle",class:"axl",transform:"rotate(-90)"},s).textContent="사고 빈도 [회/년] (log) →";
  return s;
}

const CALCSUBS=[["flow","계산 흐름"],["safety","안전성 (F-C)"],["cost","원가 (LCOH)"],["invest","투자성 (NPV/IRR)"],["adv","설계 근거"]];

function flowSVG(r){
  const P=S.params, W=700;
  const GN="var(--pass)",EC="var(--c-fp)",AC="var(--accent)";
  const LX=178,RX=522,CX=350,w=270,gap=22,topY=100;
  const leftNodes=[
    ["등급 → 고장빈도 f","proc"],
    ["AND ∏f · OR 1−∏(1−f)\n→ 사고별 빈도","proc"],
    ["선량(mSv)/10 ÷ x^"+P.doseExp+"\n→ REM 위치","proc"],
    ["11개 사고 모두\n목표곡선 아래?","dec"],
    ["F-C 판정 ("+r.npass+"/11 합격)","term"]];
  const rightNodes=[
    ["등급 → 건설비\n(1배가 × 등급배수)","proc"],
    ["CAPEX 합산\n(부품 + 격납 + 고정분)","proc"],
    ["고장 → 정지일수\n· 가동률 · 손실","proc"],
    ["LCOH(할인) =\nNPV(비용) ÷ NPV(에너지)","proc"],
    ["60년 현금흐름\n→ NPV · IRR","proc"]];
  const nh=(t,sh)=>{const n=t.split("\n").length;return sh==="term"?32:sh==="dec"?n*15+34:n*15+18;};
  const layout=nodes=>{const arr=[];let y=topY;nodes.forEach(nd=>{const h=nh(nd[0],nd[1]);arr.push({text:nd[0],shape:nd[1],cy:y+h/2,h});y+=h+gap;});return{arr,bottom:y-gap};};
  const Lc=layout(leftNodes),Rc=layout(rightNodes);
  const H=Math.max(Lc.bottom,Rc.bottom)+64;
  const s=svg(W,H);
  const defs=els("defs",{},s);const mkr=els("marker",{id:"ah",markerWidth:9,markerHeight:9,refX:7,refY:4,orient:"auto"},defs);
  els("path",{d:"M0,0 L8,4 L0,8 Z",fill:"var(--muted)"},mkr);
  function box(cx,cy,ww,h,text,shape,color){
    if(shape==="dec")els("polygon",{points:`${cx},${cy-h/2} ${cx+ww/2},${cy} ${cx},${cy+h/2} ${cx-ww/2},${cy}`,fill:"var(--surface)",stroke:color,"stroke-width":1.6},s);
    else els("rect",{x:cx-ww/2,y:cy-h/2,width:ww,height:h,rx:shape==="term"?h/2:8,fill:"var(--surface)",stroke:color,"stroke-width":1.6},s);
    const lines=text.split("\n"),ly=cy-(lines.length-1)*7.5;
    lines.forEach((ln,i)=>els("text",{x:cx,y:ly+i*15+3.6,"text-anchor":"middle",class:"fbtx"},s).textContent=ln);
  }
  function vArr(x,y1,y2,label){els("path",{d:`M${x},${y1} L${x},${y2}`,stroke:"var(--muted)","stroke-width":1.5,fill:"none","marker-end":"url(#ah)"},s);
    if(label)els("text",{x:x+8,y:(y1+y2)/2+3.5,class:"fbl"},s).textContent=label;}
  function elbow(x1,y1,x2,y2){const my=(y1+y2)/2;els("path",{d:`M${x1},${y1} L${x1},${my} L${x2},${my} L${x2},${y2}`,stroke:"var(--muted)","stroke-width":1.5,fill:"none","marker-end":"url(#ah)"},s);}
  box(CX,26,356,34,"입력: 부품 등급 · 격납배수 x 변경","term",AC);
  els("text",{x:LX,y:60,"text-anchor":"middle",class:"flh",fill:GN},s).textContent="🛡️ 안전성 → F-C";
  els("text",{x:RX,y:60,"text-anchor":"middle",class:"flh",fill:EC},s).textContent="💰 경제성 → LCOH/NPV";
  elbow(CX,43,LX,Lc.arr[0].cy-Lc.arr[0].h/2);
  elbow(CX,43,RX,Rc.arr[0].cy-Rc.arr[0].h/2);
  function draw(col,cx,color,isLeft){col.arr.forEach((n,i)=>{box(cx,n.cy,w,n.h,n.text,n.shape,color);
    if(i>0){const pv=col.arr[i-1];vArr(cx,pv.cy+pv.h/2,n.cy-n.h/2,(isLeft&&n.shape==="term")?"합격/불합격":null);}});}
  draw(Lc,LX,GN,true);draw(Rc,RX,EC,false);

}

function capexChart(r){

    .sort((a,b)=>b.val-a.val);

function srWorthChart(r){
  const G=S.params.grades, day=S.params.lossDay+S.params.penDay;
  // 각 부품: 현재→SR 전환. cost=연환산 capex 증가, benefit=연간 손실절감
  const items=C.map((c,i)=>{const g=S.grades[i];
    const cost=(c[1]*(G.SR.ratio-G[g].ratio))/S.params.opYears;
    const benefit=(G[g].freq-G.SR.freq)*c[2]*day;
    return {name:c[0],cost:Math.max(0,cost),benefit:Math.max(0,benefit),g};
  }).filter(t=>t.g!=="SR").sort((a,b)=>b.cost-a.cost);
  const W=560,H=Math.max(220,items.length*26+50),m={l:110,r:120,t:10,b:26};const s=svg(W,H);

  const X=v=>linmap(v,0,maxV,x0,x1);const rh=(y0-y1)/items.length;
  for(let k=0;k<=4;k++){const v=maxV*k/4;const gx=X(v);els("line",{x1:gx,y1:y1,x2:gx,y2:y0,class:"gl"},s);els("text",{x:gx,y:y0+14,"text-anchor":"middle",class:"ax"},s).textContent=fmt(v);}
  items.forEach((t,i)=>{const cy=y1+i*rh;const bh=rh*0.34;

    els("rect",{x:x0,y:cy+rh*0.52,width:Math.max(0,X(t.benefit)-x0),height:bh,rx:2,fill:"var(--pass)","fill-opacity":.8},s);
    els("text",{x:x0-6,y:cy+rh/2+1,"text-anchor":"end",class:"ax",fill:"var(--ink2)"},s).textContent=t.name;});

function convChart(conv){

  let pts=[];for(let lf=1;lf>=-6.3;lf-=0.12){const f=Math.pow(10,lf);let d=E.fcDose(f);if(!isFinite(d)||d>1e3)d=1e3;if(d<1e-3)d=1e-3;pts.push([X(d),Y(f)]);}
  els("polygon",{points:pts.map(q=>q[0].toFixed(1)+","+q[1].toFixed(1)).join(" ")+` ${x0},${y0} ${x0},${y1}`,fill:"var(--pass)","fill-opacity":.06},s);

  const top=elh("div",{class:"btnrow"});
  const sv=elh("button",{class:"primary"},"💾 대시보드 설계를 이벤트로 추가");sv.onclick=()=>saveEvent();
  const rnS=elh("button",{class:"ghost"},"✎ 시나리오 이름");rnS.onclick=()=>uiPrompt("시나리오 이름:",S.scenarios[S.activeScen].name,n=>{S.scenarios[S.activeScen].name=n;save();render();});
  const delS=elh("button",{class:"ghost"},"🗑 이 시나리오 삭제");delS.onclick=()=>uiConfirm("시나리오 '"+S.scenarios[S.activeScen].name+"'을(를) 삭제할까요?",()=>{S.scenarios.splice(S.activeScen,1);S.activeScen=0;save();render();});
  const rst=elh("button",{class:"ghost"},"↺ 기본 시나리오 복원");rst.onclick=()=>uiConfirm("기본 시나리오(예선 서사·본선 5후보안)를 목록에 다시 추가할까요?",()=>{defaultScenarios().forEach(sc=>S.scenarios.push(sc));save();render();});
  [sv,rnS,delS,rst].forEach(b=>top.appendChild(b));p.appendChild(top);
  const evs=activeEvents();
  if(!evs.length){p.appendChild(elh("div",{class:"panelcard"},"이 시나리오엔 이벤트가 없습니다. 대시보드에서 설계를 만들어 '이벤트로 추가'를 누르세요. (지웠던 기본 시나리오는 '기본 시나리오 복원'으로 되돌릴 수 있습니다.)"));return;}
  const rows=evs.map(ev=>({sc:ev,r:E.compute(ev.grades,ev.x,scState(ev))}));
  const bestL=Math.min(...rows.map(x=>x.r.lcoh)), bestI=Math.max(...rows.map(x=>x.r.irr));
  // ---- 4축 비교표 (PPT Slide16) ----
  const wrap=elh("div",{class:"tblwrap panelcard"});
  wrap.appendChild(elh("div",{class:"cardh"},"["+S.scenarios[S.activeScen].name+"] 이벤트 비교 — 4축 (경제·안전·신뢰·인허가)"));
  let h="<table class='dt'><thead><tr><th>#</th><th>이름</th><th>LCOH<br>(원/kWh)</th><th>IRR</th><th>안전</th><th>신뢰</th><th>인허가</th><th>SR/NSRST/NST</th><th>격납x</th><th>가동률</th><th>관리</th></tr></thead><tbody>";
  rows.forEach(({sc,r},i)=>{const c={SR:0,NSRST:0,NST:0};sc.grades.forEach(g=>c[g]++);const safe=r.npass===11;
    const lic=sc.license||"△";const licCol=lic==="O"?"var(--pass)":lic==="✗"?"var(--fail)":"var(--muted)";
    h+=`<tr><td>${i+1}</td><td>${sc.name}</td>`
      +`<td class='num' style='${r.lcoh===bestL?"font-weight:700;color:var(--pass)":""}'>${r.lcoh.toFixed(1)}</td>`
      +`<td class='num' style='${r.irr===bestI?"font-weight:700;color:var(--pass)":""}'>${(r.irr*100).toFixed(2)}%</td>`
      +`<td style='color:${safe?"var(--pass)":"var(--fail)"}'>${safe?"O":"✗"}</td>`
      +`<td style='color:${sc.penalty?"var(--pass)":"var(--fail)"}'>${sc.penalty?"O":"✗"}</td>`
      +`<td><button class='mini' data-lic='${i}' style='color:${licCol};font-weight:700'>${lic}</button></td>`
      +`<td><span class='gtag g-SR'>${c.SR}</span> <span class='gtag g-NSRST'>${c.NSRST}</span> <span class='gtag g-NST'>${c.NST}</span></td>`
      +`<td class='num'>${sc.x.toFixed(2)}</td><td class='num'>${(r.avail*100).toFixed(1)}%</td>`
      +`<td style='white-space:nowrap'><button class='mini' data-up='${i}' ${i===0?"disabled":""}>▲</button><button class='mini' data-dn='${i}' ${i===rows.length-1?"disabled":""}>▼</button><button class='mini' data-rn='${i}'>✎</button><button class='mini' data-load='${i}'>불러오기</button><button class='mini' data-del='${i}'>✕</button></td></tr>`;});
  h+="</tbody></table>";wrap.innerHTML+=h;p.appendChild(wrap);
  p.appendChild(elh("div",{class:"note"},"안전=F-C 11/11 통과 · 신뢰=고장 페널티 반영 여부 · 인허가=규제상 SR 강제 대응(직접 판단, 칸 클릭으로 전환). 초록 굵은 값=최저 LCOH·최고 IRR."));
  // ---- 진화 플롯 (경제성 LCOH·IRR + 안전여유) ----
  const acc="var(--accent)",gp="var(--pass)",fl="var(--fail)",mut="var(--muted)";
  const cap=(t)=>elh("p",{class:"chcap"},t);
  const eco=elh("div",{class:"panelcard"});eco.appendChild(elh("div",{class:"cardh"},"💰 경제성 진화 — 이벤트를 지날수록 원가·수익이 어떻게 변하나"));
  eco.appendChild(cap("<b>① 열 판매원가(LCOH) 분해</b> — 각 이벤트의 kWh당 원가를 <b>건설비·운영비(O&M)·고장페널티</b>로 쪼갠 것. 막대가 낮을수록 싸고, <b>판매가 50원 선 아래면 흑자</b>."));
  eco.appendChild(scenStackLCOH(rows));
  eco.appendChild(cap("<b>② 고장페널티만 확대</b> — 위 막대에선 안 보이는 고장 손실분만 따로. <b>고등급 설계일수록 ≈0</b>(고장이 드물다는 뜻)이라 자체 스케일로 확대해 표시."));
  eco.appendChild(scenBars(rows,row=>row.r.lcohFp,"고장 페널티 (원/kWh) — 낮을수록 좋음",
    {lab:v=>v.toFixed(3),color:(row,v,vals)=>v===Math.max(...vals)?fl:acc}));
  eco.appendChild(cap("<b>③ 투자수익률(IRR)</b> — 이 사업의 연 수익률. 점을 이어 이벤트 간 추세를 봄. <b>할인율(4.5%) 선보다 위면 투자가치 있음</b>."));
  eco.appendChild(scenLine(rows,row=>row.r.irr*100,"IRR (%) — 높을수록 좋음",
    {thresh:S.params.disc*100,threshLabel:"할인율 "+(S.params.disc*100).toFixed(1)+"%"}));
  p.appendChild(eco);
  const saf=elh("div",{class:"panelcard"});saf.appendChild(elh("div",{class:"cardh"},"🛡️ 안전성 진화 — 이벤트별 사고 안전성 비교"));
  saf.appendChild(cap("<b>① F-C 커브 나란히</b> — 각 이벤트의 사고 11개 위치. <b>모두 목표곡선 아래(초록)면 안전 통과</b>. 좌우로 스크롤해 비교."));
  saf.appendChild(scenFCrow(rows));
  saf.appendChild(cap("<b>② 최소 안전여유</b> — 각 이벤트에서 <b>가장 아슬아슬한 사고가 안전선 대비 몇 배 여유</b>인지. <b>1×=딱 통과</b>, 높을수록 든든함. (모두 통과라 O만으론 우열이 안 보이므로)"));
  saf.appendChild(scenBars(rows,row=>minMargin(row.r),"최소 안전여유 (× 배수) — 높을수록 안전",
    {thresh:1,threshLabel:"합격선 1×",axfmt:v=>v.toFixed(1),lab:v=>"×"+v.toFixed(1),
     color:(row,v,vals)=>v<1?fl:(v===Math.max(...vals)?gp:acc)}));
  p.appendChild(saf);
  // handlers (활성 시나리오의 이벤트 배열 evs 조작)
  const $=s=>document.querySelectorAll(s);
  const swap=(i,j)=>{[evs[i],evs[j]]=[evs[j],evs[i]];save();render();};
  const cyc={"O":"△","△":"✗","✗":"O"};
  $("[data-lic]").forEach(b=>b.onclick=()=>{const i=+b.dataset.lic;evs[i].license=cyc[evs[i].license||"△"];save();render();});
  $("[data-up]").forEach(b=>b.onclick=()=>swap(+b.dataset.up,+b.dataset.up-1));
  $("[data-dn]").forEach(b=>b.onclick=()=>swap(+b.dataset.dn,+b.dataset.dn+1));
  $("[data-rn]").forEach(b=>b.onclick=()=>{const i=+b.dataset.rn;uiPrompt("이벤트 이름:",evs[i].name,n=>{evs[i].name=n;save();render();});});
  $("[data-del]").forEach(b=>b.onclick=()=>{evs.splice(+b.dataset.del,1);save();render();});
  $("[data-load]").forEach(b=>b.onclick=()=>{const ev=evs[+b.dataset.load];S.grades=ev.grades.slice();S.x=ev.x;S.penalty=ev.penalty;if(ev.params)S.params=JSON.parse(JSON.stringify(ev.params));S.tab="dash";render();});
}

// ============ TAB 5: OPTIONS ============
function renderOptions(p){
  const P=S.params;
  p.appendChild(elh("div",{class:"note"},"가정값 조정 — 변경 시 전 탭 즉시 재계산. 각 항목의 <b>‘설명 ▾’</b>을 펼치면 뜻을 볼 수 있어요. 문제지 기본값에서 벗어난 값은 민감도/피칭용."));
  const mk=(label,val,step,min,max,setter,unit,desc)=>{
    const wrap=elh("div",{class:"oitem"});
    const row=elh("div",{class:"orow"});row.appendChild(elh("label",{},label));
    const inp=elh("input",{type:"number",value:val,step:step,min:min,max:max});
    inp.onchange=()=>{setter(parseFloat(inp.value));render();};row.appendChild(inp);
    if(unit)row.appendChild(elh("span",{class:"unit"},unit));
    wrap.appendChild(row);
    if(desc){const d=elh("details",{class:"odesc"});d.appendChild(elh("summary",{},"설명"));d.appendChild(elh("p",{class:"note"},desc));wrap.appendChild(d);}
    return wrap;};
  const card=(title)=>{const c=elh("div",{class:"panelcard"});c.appendChild(elh("div",{class:"cardh"},title));return c;};
  const c1=card("등급별 가산율 (건설비 배수)");
  c1.appendChild(mk("SR 가산율",P.grades.SR.ratio,0.5,5,10,v=>P.grades.SR.ratio=v,"× (5~10)","안전등급(SR)으로 지으면 건설비가 일반(NST) 대비 몇 배인지. 문제지 범위 5~10배. 클수록 SR 채택이 비싸짐."));
  c1.appendChild(mk("NSRST 가산율",P.grades.NSRST.ratio,0.5,2,3,v=>P.grades.NSRST.ratio=v,"× (2~3)","특별관리등급(NSRST) 건설비 배수. 문제지 범위 2~3배."));
  p.appendChild(c1);
  const c2=card("등급별 고장빈도 (안전·가동률 영향)");
  c2.appendChild(mk("SR 고장빈도",P.grades.SR.freq,1e-6,0,1,v=>P.grades.SR.freq=v,"회/년","그 등급 부품이 1년에 고장 날 기대 횟수. 낮을수록 안전·고신뢰. F-C 빈도와 정지일수에 직접 반영."));
  c2.appendChild(mk("NSRST 고장빈도",P.grades.NSRST.freq,1e-4,0,1,v=>P.grades.NSRST.freq=v,"회/년","특별관리등급의 연간 고장 기대 횟수(기본 1e-3)."));
  c2.appendChild(mk("NST 고장빈도",P.grades.NST.freq,1e-2,0,1,v=>P.grades.NST.freq=v,"회/년","일반등급의 연간 고장 기대 횟수(기본 1e-1, 즉 10년에 1번)."));
  p.appendChild(c2);
  const c5=card("격납건물 · 안전 모델");
  c5.appendChild(mk("선량저감 지수 n",P.doseExp,0.5,0.5,4,v=>P.doseExp=v,"(선량 ÷ xⁿ)","격납건물 비용을 x배 쓰면 누출선량이 1/xⁿ로 줄어듦. 기본 n=2 → 1/x². n을 키우면 격납 투자 대비 안전이득이 커짐(수식 형태 자체를 바꿈)."));
  p.appendChild(c5);
  const c3=card("경제성 가정 (NPV/IRR)");
  c3.appendChild(mk("할인율",P.disc,0.005,0,0.2,v=>P.disc=v,"(예 0.045)","미래의 돈을 현재가치로 깎는 비율. 높을수록 미래 수익을 박하게 봄. IRR이 이 값보다 크면 투자가치 있음."));
  c3.appendChild(mk("상승률 (escalation)",P.esc,0.005,0,0.1,v=>P.esc=v,"(예 0.025)","열 판매가·운영비가 매년 오르는 비율(물가상승 등). NPV/IRR 현금흐름에 해마다 복리로 적용됨. LCOH에는 영향 없음."));
  c3.appendChild(mk("열 판매단가",P.heatPrice,1,0,200,v=>P.heatPrice=v,"원/kWh","열을 kWh당 얼마에 파는지. 계약가 50원. LCOH가 이보다 낮아야 돈을 벌고, 현금흐름·IRR을 좌우."));
  p.appendChild(c3);
  const c4=card("신뢰도 가정 (열공급 계약)");
  c4.appendChild(mk("정지 1일 판매손실",P.lossDay,1,0,1000,v=>P.lossDay=v,"백만원/일","고장으로 열공급이 하루 멈출 때 못 판 매출. 연매출 39,420 ÷ 365 = 108."));
  c4.appendChild(mk("정지 1일 위약금",P.penDay,1,0,1000,v=>P.penDay=v,"백만원/일","공급 중단 시 계약상 하루당 물어주는 위약금(기본 100). 손실과 합쳐 정지 1일당 208."));
  p.appendChild(c4);
  const c6=card("가동 가정");
  c6.appendChild(mk("기본 이용률",P.baseCF,0.01,0,1,v=>P.baseCF=v,"(1.0 = 100%)","고장과 별개로, 정기 정비·재장전 등으로 매년 못 돌리는 몫을 반영. 예 0.95면 페널티 OFF라도 가동률 95%. <b>실제 가동률 = 기본 이용률 × (고장 반영 가동률)</b>. 기본 1.0(문제지 계약열량 가정)."));
  p.appendChild(c6);
  const rst=elh("button",{class:"ghost"},"↺ 문제지 기본값 복원");
  rst.onclick=()=>{S.params=E.defaults();render();};p.appendChild(rst);
}

render();
matchMedia("(prefers-color-scheme:dark)").addEventListener("change",render);
</script>
